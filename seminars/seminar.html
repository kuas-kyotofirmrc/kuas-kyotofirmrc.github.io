<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>研究会 – KUAS京都企業研究センター</title>
  <link rel="stylesheet" href="../style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    .seminar-body {
      background: #fff;
      border: 1px solid var(--border, #d0e4d8);
      border-radius: 6px;
      padding: 2.5rem 3rem;
      margin-top: 1.5rem;
    }

    .seminar-body h1 { font-family: "Noto Serif JP", serif; font-size: 1.4rem; color: #1e4d35; margin-bottom: 1.25rem; letter-spacing: 0.06em; line-height: 1.5; }
    .seminar-body h2 { font-family: "Noto Serif JP", serif; font-size: 1rem; color: #1e4d35; margin: 2rem 0 0.6rem; padding-bottom: 0.4rem; border-bottom: 1px solid #d0e4d8; letter-spacing: 0.08em; }
    .seminar-body h3 { font-size: 0.95rem; font-weight: 500; margin: 1rem 0 0.3rem; color: #2d6a4f; }
    .seminar-body p  { margin-bottom: 0.9rem; font-size: 0.95rem; font-weight: 400; }
    .seminar-body ul, .seminar-body ol { padding-left: 1.5rem; margin-bottom: 0.9rem; font-size: 0.95rem; font-weight: 400; }
    .seminar-body li { margin-bottom: 0.4rem; }
    .seminar-body a  { color: #2d6a4f; text-decoration: none; border-bottom: 1px solid #d8f3dc; transition: border-color 0.15s; }
    .seminar-body a:hover { border-bottom-color: #52b788; }
    .seminar-body strong { font-weight: 500; }
    .seminar-body hr { border: none; border-top: 1px solid #d0e4d8; margin: 2rem 0; }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 1.25rem;
      color: #2d6a4f;
      text-decoration: none;
      font-size: 0.83rem;
      letter-spacing: 0.05em;
      border-bottom: 1px solid transparent;
      transition: border-color 0.15s;
    }
    .back-link:hover { border-bottom-color: #52b788; }

    #error-msg { color: #c00; margin-top: 1rem; font-size: 0.9rem; }

    @media (max-width: 640px) {
      .seminar-body { padding: 1.5rem 1.25rem; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>KUAS京都企業研究センター</h1>
      <p class="subtitle">KUAS Kyoto Firm Research Center</p>
    </div>
  </header>

  <main style="max-width:900px;margin:2rem auto;padding:0 1.5rem 3rem;">
    <a class="back-link" href="../#seminars">← 研究会一覧に戻る</a>
    <div id="content" class="seminar-body">読み込み中...</div>
    <p id="error-msg" style="display:none"></p>
  </main>

  <footer>
    <p>© 2024 KUAS京都企業研究センター / KUAS Kyoto Firm Research Center</p>
  </footer>

  <script>
    async function loadMarkdown() {
      const params = new URLSearchParams(location.search);
      const file = params.get('file');

      if (!file || !file.endsWith('.md') || file.includes('..')) {
        showError('ファイルが指定されていません。');
        return;
      }

      try {
        const res = await fetch(file);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const text = await res.text();
        const html = marked.parse(text);
        document.getElementById('content').innerHTML = html;

        // Set page title from first h1
        const h1 = document.querySelector('#content h1');
        if (h1) document.title = h1.textContent + ' – KUAS京都企業研究センター';
      } catch (e) {
        showError('ファイルの読み込みに失敗しました。');
      }
    }

    function showError(msg) {
      document.getElementById('content').style.display = 'none';
      const err = document.getElementById('error-msg');
      err.textContent = msg;
      err.style.display = 'block';
    }

    loadMarkdown();
  </script>
</body>
</html>
